<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Typography</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            background: #f3f0e8;
            color: #161616;
        }

        h1 {
            text-transform: uppercase;
            font-family: "Arial Black", sans-serif;
            font-weight: 800;
            font-size: clamp(3rem, 10vw, 15rem);
            line-height: 0.9;
            letter-spacing: 0;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: clamp(1.25rem, 4vw, 4rem);
        }

        .header {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: clamp(0.25rem, 1vw, 1rem);
        }

        .hero h1:nth-child(1) {
            align-self: flex-end;
        }

        .hero h1:nth-child(2) {
            align-self: center;
        }

        #fluid {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: difference;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>

<body>
    <section class="hero">
        <div class="header">
            <h1>Fluid Typography with CSS Clamp</h1>
            <h1>Constant Fluid</h1>
        </div>
    </section>
    <canvas id="fluid"></canvas>

    <script type="module">
        import * as THREE from "three";

        const v = `varying vec2 vUv; void main() { vUv = uv; gl_Position =vec4(position, 1.0); }`;
        const p = `precision highp float; `;
        const s = `precision mediump sampler2D; `;

        const shaders = {
            splat: [
                v,
                `${p} ${s}
uniform sampler2D uTarget; uniform float aspectRatio; uniform vec3 color; uniform vec2 point; uniform float radius; varying vec2 vUv; void main() { vec2 p = vUv - point; p.x *= aspectRatio; gl_FragColor = vec4(texture2D(uTarget, vUv).xyz + exp(-dot(p, p) /radius)*color, 1.0); }`
            ],
            advection: [
                v,
                `${p} ${s}
uniform sampler2D uVelocity, uSource;
uniform vec2 texelSize;
uniform float dt, dissipation;
varying vec2 vUv;

void main(){
  vec2 coord = vUv - dt * texture2D(uVelocity, vUv).xy * texelSize;
  gl_FragColor = dissipation * texture2D(uSource, coord);
}`
            ],
            divergence: [
                v,
                `${p} ${s}
uniform sampler2D uVelocity;
uniform vec2 texelSize;
varying vec2 vUv;

vec2 vel(vec2 uv){
  vec2 e = vec2(1.);

  if(uv.x < 0.){ uv.x = 0.; e.x = -1.; }
  if(uv.x > 1.){ uv.x = 1.; e.x = -1.; }
  if(uv.y < 0.){ uv.y = 0.; e.y = -1.; }
  if(uv.y > 1.){ uv.y = 1.; e.y = -1.; }

  return texture2D(uVelocity, uv).xy * e;
}

void main(){
  vec2 L = vUv - vec2(texelSize.x, 0.),
       R = vUv + vec2(texelSize.x, 0.),
       T = vUv + vec2(0., texelSize.y),
       B = vUv - vec2(0., texelSize.y);

  gl_FragColor = vec4(
    0.5 * (vel(R).x - vel(L).x + vel(T).y - vel(B).y),
    0.,
    0.,
    1.
  );
}`
            ],
            curl: [
                v,
                `${p} ${s}
uniform sampler2D uVelocity;
uniform vec2 texelSize;
varying vec2 vUv;

void main(){
  vec2 L = vUv - vec2(texelSize.x, 0.),
       R = vUv + vec2(texelSize.x, 0.),
       T = vUv + vec2(0., texelSize.y),
       B = vUv - vec2(0., texelSize.y);

  float vorticity = texture2D(uVelocity, R).y
                  - texture2D(uVelocity, L).y
                  - texture2D(uVelocity, T).x
                  + texture2D(uVelocity, B).x;

  gl_FragColor = vec4(vorticity, 0., 0., 1.);
}`
            ],
            vorticity: [
                v,
                `${p} ${s}
uniform sampler2D uVelocity, uCurl;
uniform vec2 texelSize;
uniform float curlStrength, dt;
varying vec2 vUv;

void main(){
  vec2 L = vUv - vec2(texelSize.x, 0.),
       R = vUv + vec2(texelSize.x, 0.),
       T = vUv + vec2(0., texelSize.y),
       B = vUv - vec2(0., texelSize.y);

  vec2 force = vec2(
    abs(texture2D(uCurl, T).x) - abs(texture2D(uCurl, B).x),
    abs(texture2D(uCurl, R).x) - abs(texture2D(uCurl, L).x)
  );

  force = normalize(force + 0.0001) * curlStrength * texture2D(uCurl, vUv).x;

  gl_FragColor = vec4(
    texture2D(uVelocity, vUv).xy + force * dt,
    0.,
    1.
  );
}`
            ],
            pressure: [
                v,
                `${p} ${s}
uniform sampler2D uPressure, uDivergence;
uniform vec2 texelSize;
varying vec2 vUv;

void main(){
  vec2 L = clamp(vUv - vec2(texelSize.x, 0.), 0., 1.),
       R = clamp(vUv + vec2(texelSize.x, 0.), 0., 1.),
       T = clamp(vUv + vec2(0., texelSize.y), 0., 1.),
       B = clamp(vUv - vec2(0., texelSize.y), 0., 1.);

  gl_FragColor = vec4(
    0.25 * (
      texture2D(uPressure, L).x +
      texture2D(uPressure, R).x +
      texture2D(uPressure, T).x +
      texture2D(uPressure, B).x -
      texture2D(uDivergence, vUv).x
    ),
    0.,
    0.,
    1.
  );
}`
            ],
            gradientSubtract: [
                v,
                `${p} ${s}
uniform sampler2D uPressure, uVelocity;
uniform vec2 texelSize;
varying vec2 vUv;

void main(){
  float pL = texture2D(uPressure, clamp(vUv - vec2(texelSize.x, 0.), 0., 1.)).x,
        pR = texture2D(uPressure, clamp(vUv + vec2(texelSize.x, 0.), 0., 1.)).x,
        pT = texture2D(uPressure, clamp(vUv + vec2(0., texelSize.y), 0., 1.)).x,
        pB = texture2D(uPressure, clamp(vUv - vec2(0., texelSize.y), 0., 1.)).x;

  gl_FragColor = vec4(
    texture2D(uVelocity, vUv).xy - vec2(pR - pL, pT - pB),
    0.,
    1.
  );
}`
            ],
            clear: [
                v,
                `${p} ${s}
uniform sampler2D uTexture; uniform float value; varying vec2 vUv;
void main(){ gl_FragColor=value*texture2D(uTexture,vUv); }`
            ],
            display: [
                v,
                `${p}
uniform sampler2D uTexture; uniform float threshold,edgeSoftness;
uniform vec3 inkColor; varying vec2 vUv;
void main(){ float d=clamp(length(texture2D(uTexture,vUv).rgb),0.,1.);
float a=edgeSoftness>0.?smoothstep(threshold+edgeSoftness*.5,threshold
-edgeSoftness*.5,d):step(threshold,d); gl_FragColor=vec4(inkColor,a); }`
            ]
        };

        class FluidSimulation {
            constructor(canvas, config) {
                this.config = config;
                this._setupRenderer(canvas);
                this._setupScene();
                this._setupTargets();
                this._setupMaterials();
                this._setupInput();
                this._loop();
            }

            _setupRenderer(canvas) {
                this.renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.dpr = this.renderer.getPixelRatio();
                this.width = window.innerWidth * this.dpr;
                this.height = window.innerHeight * this.dpr;

                window.addEventListener("resize", () => {
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    this.width = window.innerWidth * this.dpr;
                    this.height = window.innerHeight * this.dpr;
                });
            }

            _setupScene() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                this.quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2));
                this.scene.add(this.quad);
            }

            _setupTargets() {
                const { simResolution: simRes, dyeResolution: dyeRes } = this.config;
                const aspect = this.width / this.height;
                const options = { type: THREE.HalfFloatType, depthBuffer: false, minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter };

                const single = (w, h) => new THREE.WebGLRenderTarget(w, h, options);
                const double = (w, h) => ({
                    read: single(w, h),
                    write: single(w, h),
                    swap() {
                        [this.read, this.write] = [this.write, this.read];
                    }
                });

                this.simSize = { w: simRes, h: Math.round(simRes / aspect) };
                this.dyeSize = { w: dyeRes, h: Math.round(dyeRes / aspect) };

                this.velocity = double(this.simSize.w, this.simSize.h);
                this.dye = double(this.dyeSize.w, this.dyeSize.h);
                this.divergence = single(this.simSize.w, this.simSize.h);
                this.curl = single(this.simSize.w, this.simSize.h);
                this.pressure = double(this.simSize.w, this.simSize.h);

                this.simTexel = new THREE.Vector2(1 / this.simSize.w, 1 / this.simSize.h);
                this.dyeTexel = new THREE.Vector2(1 / this.dyeSize.w, 1 / this.dyeSize.h);
            }

            _setupMaterials() {
                const make = ([vert, frag], uniforms) =>
                    new THREE.ShaderMaterial({ vertexShader: vert, fragmentShader: frag, uniforms, depthWrite: false, depthTest: false });

                const tex = () => ({ value: null });
                const num = (v = 0) => ({ value: v });
                const vec2 = () => ({ value: new THREE.Vector2() });

                this.material = {
                    splat: make(shaders.splat, {
                        uTarget: tex(),
                        aspectRatio: num(),
                        radius: num(),
                        color: { value: new THREE.Vector3() },
                        point: vec2()
                    }),
                    advection: make(shaders.advection, {
                        uVelocity: tex(), uSource: tex(), texelSize: vec2(), dt: num(), dissipation: num()
                    }),
                    divergence: make(shaders.divergence, {
                        uVelocity: tex(), texelSize: { value: this.simTexel }
                    }),
                    curl: make(shaders.curl, {
                        uVelocity: tex(), texelSize: { value: this.simTexel }
                    }),
                    vorticity: make(shaders.vorticity, {
                        uVelocity: tex(), uCurl: tex(), texelSize: { value: this.simTexel }, curlStrength: num(), dt: num()
                    }),
                    pressure: make(shaders.pressure, {
                        uPressure: tex(), uDivergence: tex(), texelSize: { value: this.simTexel }
                    }),
                    gradientSubtract: make(shaders.gradientSubtract, {
                        uPressure: tex(), uVelocity: tex(), texelSize: { value: this.simTexel }
                    }),
                    clear: make(shaders.clear, { uTexture: tex(), value: num() }),
                    display: make(shaders.display, {
                        uTexture: tex(), threshold: num(), edgeSoftness: num(), inkColor: { value: this.config.inkColor }
                    })
                };
            }

            _setupInput() {
                this.mouse = { x: 0, y: 0, velocityX: 0, velocityY: 0, moved: false };

                const onMove = (x, y) => {
                    const scaledX = x * this.dpr;
                    const scaledY = y * this.dpr;
                    this.mouse.velocityX = (scaledX - this.mouse.x) * this.config.forceStrength;
                    this.mouse.velocityY = (scaledY - this.mouse.y) * this.config.forceStrength;
                    this.mouse.x = scaledX;
                    this.mouse.y = scaledY;
                    this.mouse.moved = true;
                };

                window.addEventListener("mousemove", (e) => onMove(e.clientX, e.clientY));
                window.addEventListener("touchmove", (e) => {
                    e.preventDefault();
                    onMove(e.touches[0].clientX, e.touches[0].clientY);
                }, { passive: false });
            }

            _pass(material, target) {
                this.quad.material = material;
                this.renderer.setRenderTarget(target ?? null);
                this.renderer.render(this.scene, this.camera);
            }

            _splat(x, y, velocityX, velocityY) {
                const splatMat = this.material.splat.uniforms;

                splatMat.aspectRatio.value = this.width / this.height;
                splatMat.point.value.set(x / this.width, 1.0 - y / this.height);
                splatMat.radius.value = this.config.splatRadius / 100.0;

                splatMat.uTarget.value = this.velocity.read.texture;
                splatMat.color.value.set(velocityX, -velocityY, 0);
                this._pass(this.material.splat, this.velocity.write);
                this.velocity.swap();

                splatMat.uTarget.value = this.dye.read.texture;
                splatMat.color.value.set(3.0, 3.0, 3.0);
                this._pass(this.material.splat, this.dye.write);
                this.dye.swap();
            }

            _simulate(dt) {
                const m = this.material;

                m.curl.uniforms.uVelocity.value = this.velocity.read.texture;
                this._pass(m.curl, this.curl);

                m.vorticity.uniforms.uVelocity.value = this.velocity.read.texture;
                m.vorticity.uniforms.uCurl.value = this.curl.texture;
                m.vorticity.uniforms.curlStrength.value = this.config.curl;
                m.vorticity.uniforms.dt.value = dt;
                this._pass(m.vorticity, this.velocity.write);
                this.velocity.swap();

                m.divergence.uniforms.uVelocity.value = this.velocity.read.texture;
                this._pass(m.divergence, this.divergence);

                m.clear.uniforms.uTexture.value = this.pressure.read.texture;
                m.clear.uniforms.value.value = this.config.pressureDecay;
                this._pass(m.clear, this.pressure.write);
                this.pressure.swap();

                m.pressure.uniforms.uDivergence.value = this.divergence.texture;
                for (let i = 0; i < this.config.pressureIterations; i++) {
                    m.pressure.uniforms.uPressure.value = this.pressure.read.texture;
                    this._pass(m.pressure, this.pressure.write);
                    this.pressure.swap();
                }

                m.gradientSubtract.uniforms.uPressure.value = this.pressure.read.texture;
                m.gradientSubtract.uniforms.uVelocity.value = this.velocity.read.texture;
                this._pass(m.gradientSubtract, this.velocity.write);
                this.velocity.swap();

                m.advection.uniforms.uVelocity.value = this.velocity.read.texture;
                m.advection.uniforms.uSource.value = this.velocity.read.texture;
                m.advection.uniforms.texelSize.value = this.simTexel;
                m.advection.uniforms.dt.value = dt;
                m.advection.uniforms.dissipation.value = this.config.velocityDissipation;
                this._pass(m.advection, this.velocity.write);
                this.velocity.swap();

                m.advection.uniforms.uVelocity.value = this.velocity.read.texture;
                m.advection.uniforms.uSource.value = this.dye.read.texture;
                m.advection.uniforms.texelSize.value = this.dyeTexel;
                m.advection.uniforms.dissipation.value = this.config.dyeDissipation;
                this._pass(m.advection, this.dye.write);
                this.dye.swap();
            }

            _render() {
                this.material.display.uniforms.uTexture.value = this.dye.read.texture;
                this.material.display.uniforms.threshold.value = this.config.threshold;
                this.material.display.uniforms.edgeSoftness.value = this.config.edgeSoftness;
                this._pass(this.material.display, null);
            }

            _loop() {
                let lastTime = performance.now();

                const tick = () => {
                    const now = performance.now();
                    const dt = Math.min((now - lastTime) / 1000, 0.016);
                    lastTime = now;

                    if (this.mouse.moved) {
                        this._splat(this.mouse.x, this.mouse.y, this.mouse.velocityX, this.mouse.velocityY);
                        this.mouse.moved = false;
                    }

                    this._simulate(dt);
                    this._render();
                    requestAnimationFrame(tick);
                };
                tick();
            }
        }

        const config = {
            simResolution: 256,
            dyeResolution: 1024,
            curl: 25,
            pressureIterations: 50,
            velocityDissipation: 0.95,
            dyeDissipation: 0.95,
            splatRadius: 0.275,
            forceStrength: 7.5,
            pressureDecay: 0.75,
            threshold: 1.0,
            edgeSoftness: 0.0,
            inkColor: new THREE.Color(1, 1, 1)
        };

        new FluidSimulation(document.getElementById("fluid"), config);
    </script>
</body>

</html>
